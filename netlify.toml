[build]
  command = "npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "20" }

[dev]
  framework = "vite"
  targetPort = 3001
  port = 8888
  autoLaunch = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
